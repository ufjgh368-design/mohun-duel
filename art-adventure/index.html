<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#3aa6a0">
<title>藝術尋寶大冒險：成為藝術創作大師</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- 頂部狀態列 -->
<header id="hud" class="hidden">
  <button id="hud-map" class="hud-btn" title="回到地圖">🗺️</button>
  <div class="hud-rank">
    <span id="hud-icon">🌱</span>
    <div class="hud-rankinfo">
      <span id="hud-title">藝術新手</span>
      <div class="hud-expbar"><div id="hud-expfill"></div></div>
    </div>
  </div>
  <div class="hud-cards" title="收藏的藝術卡">🃏 <span id="hud-cardcount">0</span></div>
</header>

<main id="stage"><!-- 各畫面注入處 --></main>

<!-- 慶祝特效層 -->
<div id="fx-layer" class="hidden"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
